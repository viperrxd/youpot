<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouPOT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ff2a5f;
            --accent-glow: rgba(255, 42, 95, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b92a5;
            --success: #00e676;
            --success-glow: rgba(0, 230, 118, 0.3);
            --error: #ff1744;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 42, 95, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(100, 100, 255, 0.08), transparent 25%);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        h1 {
            margin: 0 0 10px 0;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .data-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .data-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .data-card code {
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--accent);
            word-break: break-all;
            display: block;
        }

        .visitor-data {
            color: var(--text-main) !important;
            font-size: 0.9rem !important;
            max-height: 60px;
            overflow-y: auto;
        }
        
        .visitor-data::-webkit-scrollbar {
            width: 4px;
        }
        .visitor-data::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 4px;
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px var(--accent-glow);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px var(--accent-glow);
            background: #ff4070;
        }

        button:active {
            transform: translateY(1px);
        }

        button.loading {
            pointer-events: none;
            color: transparent;
        }

        button.loading::after {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            top: 50%;
            left: 50%;
            margin-top: -12px;
            margin-left: -12px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        .result.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .result.valid {
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid rgba(0, 230, 118, 0.3);
            color: var(--success);
            box-shadow: 0 0 20px var(--success-glow);
        }

        .result.invalid {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            color: var(--error);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>YouPOT</h1>
        <p class="subtitle">BotGuard Token Generator API</p>

        <div class="data-card">
            <h3>Current poToken</h3>
            <code id="potoken-display">Fetching...</code>
        </div>

        <div class="data-card">
            <h3>Current visitorData</h3>
            <code id="visitordata-display" class="visitor-data">Fetching...</code>
        </div>

        <button id="validate-btn" onclick="validateTokens()">Validate Tokens</button>

        <div id="result-box" class="result">
            <span id="result-text"></span>
            <div id="result-subtext" style="font-size: 0.9rem; font-weight: 400; margin-top: 5px; opacity: 0.8"></div>
        </div>
    </div>

    <script>
        // Fetch current tokens on load
        async function fetchTokens() {
            try {
                const res = await fetch('/api/token');
                const data = await res.json();
                document.getElementById('potoken-display').innerText = data.poToken || 'Unavailable';
                document.getElementById('visitordata-display').innerText = data.visitorData || 'Unavailable';
            } catch (err) {
                document.getElementById('potoken-display').innerText = 'Error fetching API';
                document.getElementById('visitordata-display').innerText = 'Error fetching API';
            }
        }

        async function validateTokens() {
            const btn = document.getElementById('validate-btn');
            const resultBox = document.getElementById('result-box');
            const resultText = document.getElementById('result-text');
            const resultSubtext = document.getElementById('result-subtext');

            btn.classList.add('loading');
            resultBox.classList.remove('show', 'valid', 'invalid');

            try {
                const res = await fetch('/api/validate');
                const data = await res.json();
                
                resultBox.classList.add('show');
                
                if (data.valid) {
                    resultBox.classList.add('valid');
                    resultText.innerText = '✅ TOKENS ARE VALID';
                    resultSubtext.innerText = `YouTube granted access. Found ${data.formats} streaming formats.`;
                    
                    // Add a tiny success bounce animation to the container
                    document.querySelector('.container').style.transform = 'scale(1.02)';
                    setTimeout(() => document.querySelector('.container').style.transform = 'scale(1)', 200);
                } else {
                    resultBox.classList.add('invalid');
                    resultText.innerText = '❌ TOKENS ARE INVALID';
                    resultSubtext.innerText = `YouTube blocked playback: ${data.reason}`;
                }
            } catch (err) {
                resultBox.classList.add('show', 'invalid');
                resultText.innerText = '❌ VALIDATION ERROR';
                resultSubtext.innerText = 'Could not reach validation API.';
            } finally {
                btn.classList.remove('loading');
            }
        }

        fetchTokens();
    </script>
</body>
</html>
